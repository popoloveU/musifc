<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ytcard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  background:#f2f2f7;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:52px 20px 80px;
}

/* input */
.bar{display:flex;width:100%;max-width:480px;margin-bottom:6px;
  background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden}
.bar input{flex:1;border:none;outline:none;padding:13px 16px;
  font-size:15px;font-family:inherit;color:#111;background:transparent}
.bar input::placeholder{color:#aaa}
.bar button{border:none;background:none;border-left:1px solid #e8e8e8;
  padding:13px 18px;font-size:14px;font-weight:500;color:#007aff;
  cursor:pointer;font-family:inherit}
.bar button:active{background:#f0f0f0}
.err{font-size:12px;color:#e03;width:100%;max-width:480px;min-height:16px;margin-bottom:10px}
.prog{width:100%;max-width:480px;height:2px;background:#e5e5ea;
  border-radius:2px;margin-bottom:20px;overflow:hidden}
.prog.on::after{content:'';display:block;height:100%;width:40%;
  background:#007aff;border-radius:2px;animation:sl .8s linear infinite}
@keyframes sl{from{transform:translateX(-150%)}to{transform:translateX(350%)}}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;width:100%;max-width:880px}
.empty{grid-column:1/-1;text-align:center;padding:48px 0;
  font-size:14px;color:#aaa}

/* card */
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  animation:up .32s ease both;
  position:relative;
  cursor:pointer;
  transition:transform .18s,box-shadow .18s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.14)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* album art — square */
.art{position:relative;width:100%;aspect-ratio:1/1;background:#1c1c1e;overflow:hidden}
.art img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .4s}
.art img.ok{opacity:1}

/* text info — Apple Music style */
.info{padding:10px 12px 14px}
.title{
  font-size:14px;font-weight:600;color:#1c1c1e;
  line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:3px;
  outline:none;
  border-radius:4px;
  padding:1px 2px;margin-left:-2px;
}
.title:focus{background:#f2f2f7}
.artist{font-size:12px;color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* action row */
.acts{display:flex;gap:6px;margin-top:10px}
.abtn{
  flex:1;border:1px solid #e5e5ea;background:#fff;
  border-radius:8px;padding:7px 4px;
  font-size:11px;font-weight:500;color:#3c3c43;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;
  font-family:inherit;transition:background .12s;
}
.abtn:hover{background:#f2f2f7}
.abtn.red:hover{background:#fff0f0;color:#d44;border-color:#f5cccc}
.abtn svg{width:12px;height:12px;flex-shrink:0}
input[type=file]{display:none}

/* hover overlay on art */
.art-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);opacity:0;transition:opacity .18s;
}
.card:hover .art-overlay{opacity:1}
.play-ring{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;
}
.play-ring svg{width:16px;height:16px;margin-left:2px}
</style>
</head>
<body>

<div class="bar">
  <input id="u" type="text" placeholder="YouTube URL" autocomplete="off" spellcheck="false"/>
  <button id="add">추가</button>
</div>
<div class="err" id="err"></div>
<div class="prog" id="prog"></div>
<div class="grid" id="grid"></div>
<canvas id="cv" style="display:none"></canvas>

<script>
const SK='ytcard-v5';
let db=JSON.parse(localStorage.getItem(SK)||'[]');
const save=()=>localStorage.setItem(SK,JSON.stringify(db));

/* color extract */
function extractColors(img,n=5){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=cv.height=80;ctx.drawImage(img,0,0,80,80);
  const px=ctx.getImageData(0,0,80,80).data,bk={};
  for(let i=0;i<px.length;i+=4){
    if(px[i+3]<128)continue;
    const r=Math.round(px[i]/32)*32,g=Math.round(px[i+1]/32)*32,b=Math.round(px[i+2]/32)*32;
    const lum=.299*r+.587*g+.114*b;
    if(lum<18||lum>238)continue;
    const k=`${r},${g},${b}`;bk[k]=(bk[k]||0)+1;
  }
  const sorted=Object.entries(bk).sort((a,b)=>b[1]-a[1]);
  const picked=[];
  for(const[k]of sorted){
    const[r,g,b]=k.split(',').map(Number);
    if(!picked.some(([pr,pg,pb])=>Math.abs(r-pr)+Math.abs(g-pg)+Math.abs(b-pb)<55))
      picked.push([r,g,b]);
    if(picked.length>=n)break;
  }
  return picked.map(([r,g,b])=>({r,g,b,hex:'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}));
}

/* save as image — Apple Music style portrait card */
function darken(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

function saveCard(card){
  const W=1080,H=1350;
  const oc=document.createElement('canvas');
  oc.width=W;oc.height=H;
  const ctx=oc.getContext('2d');

  const doRender=imgEl=>{
    /* extract colors fresh from the actual image */
    let c0='#1c1c1e',c1='#2c2c2e';
    if(imgEl.width){
      const tmp=document.getElementById('cv'),tc=tmp.getContext('2d');
      tmp.width=tmp.height=80;
      tc.drawImage(imgEl,0,0,80,80);
      const px=tc.getImageData(0,0,80,80).data,bk={};
      for(let i=0;i<px.length;i+=4){
        if(px[i+3]<128)continue;
        const r=Math.round(px[i]/32)*32,g=Math.round(px[i+1]/32)*32,b=Math.round(px[i+2]/32)*32;
        const lum=.299*r+.587*g+.114*b;
        if(lum<18||lum>238)continue;
        const k=`${r},${g},${b}`;bk[k]=(bk[k]||0)+1;
      }
      const sorted=Object.entries(bk).sort((a,b)=>b[1]-a[1]);
      const picked=[];
      for(const[k]of sorted){
        const[r,g,b]=k.split(',').map(Number);
        if(!picked.some(([pr,pg,pb])=>Math.abs(r-pr)+Math.abs(g-pg)+Math.abs(b-pb)<55))picked.push([r,g,b]);
        if(picked.length>=3)break;
      }
      if(picked[0])c0='#'+picked[0].map(v=>v.toString(16).padStart(2,'0')).join('');
      if(picked[1])c1='#'+picked[1].map(v=>v.toString(16).padStart(2,'0')).join('');
    }

    /* bg — darkened image colors */
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,darken(c0,.12));
    grd.addColorStop(1,darken(c1,.18));
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

    /* glow blob */
    const glow=ctx.createRadialGradient(W/2,400,0,W/2,400,500);
    glow.addColorStop(0,c0+'50');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);

    /* album art */
    const PAD=80,AW=W-PAD*2,AH=AW,AY=100,R=40;
    ctx.save();
    roundRect(ctx,PAD,AY,AW,AH,R);
    ctx.clip();
    if(imgEl.width)ctx.drawImage(imgEl,PAD,AY,AW,AH);
    else{ctx.fillStyle='#2c2c2e';ctx.fillRect(PAD,AY,AW,AH);}
    ctx.restore();

    /* inner shadow on art */
    ctx.save();
    roundRect(ctx,PAD,AY,AW,AH,R);
    ctx.clip();
    const ins=ctx.createLinearGradient(0,AY,0,AY+AH);
    ins.addColorStop(0,'rgba(0,0,0,.2)');ins.addColorStop(.12,'transparent');
    ins.addColorStop(.88,'transparent');ins.addColorStop(1,'rgba(0,0,0,.35)');
    ctx.fillStyle=ins;ctx.fillRect(PAD,AY,AW,AH);
    ctx.restore();

    /* title + chevron — tight layout */
    const TY=AY+AH+62;
    const FONT_TITLE=`700 52px -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial`;
    ctx.font=FONT_TITLE;
    const titleLines=breakText(ctx,card.title,AW-80,2);
    ctx.fillStyle='rgba(255,255,255,.96)';
    titleLines.forEach((line,i)=>ctx.fillText(line,PAD,TY+i*62));

    /* chevron > after last title line */
    const lastLine=titleLines[titleLines.length-1];
    const lastW=ctx.measureText(lastLine).width;
    const chevX=PAD+lastW+14;
    const chevY=TY+(titleLines.length-1)*62;
    ctx.strokeStyle='rgba(255,255,255,.4)';
    ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(chevX,chevY-32);
    ctx.lineTo(chevX+20,chevY-14);
    ctx.lineTo(chevX,chevY+4);
    ctx.stroke();

    /* artist — right below title, tight */
    const artistY=TY+titleLines.length*62+6;
    ctx.fillStyle='rgba(255,255,255,.48)';
    ctx.font=`400 34px -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial`;
    ctx.fillText(card.channel,PAD,artistY,AW);

    const a=document.createElement('a');
    a.download=(card.title.slice(0,36).replace(/[^\w\s]/g,'')||'card').trim()+'.png';
    a.href=oc.toDataURL('image/png');a.click();
  };

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>doRender(img);
  img.onerror=()=>{if(img.src!==card.thumbFb)img.src=card.thumbFb;else doRender(new Image());};
  img.src=card.customThumb||card.thumb;
}

function breakText(ctx,text,maxW,maxLines){
  const words=text.split(' ');const lines=[];let cur='';
  for(const w of words){
    const test=cur+(cur?' ':'')+w;
    if(ctx.measureText(test).width>maxW&&cur){
      lines.push(cur);cur=w;
      if(lines.length>=maxLines-1){cur=words.slice(words.indexOf(w)).join(' ');break;}
    }else cur=test;
  }
  if(cur)lines.push(cur);
  return lines;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}



/* youtube */
function ytId(url){
  const ps=[/youtu\.be\/([^?&]+)/,/[?&]v=([^&]+)/,/embed\/([^?&]+)/,/shorts\/([^?&]+)/];
  for(const p of ps){const m=url.match(p);if(m)return m[1];}return null;
}
async function fetchMeta(vid){
  const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
  if(!r.ok)throw new Error('영상을 찾을 수 없어요');
  const d=await r.json();
  return{title:d.title,channel:d.author_name,
    thumb:`https://img.youtube.com/vi/${vid}/maxresdefault.jpg`,
    thumbFb:`https://img.youtube.com/vi/${vid}/hqdefault.jpg`,
    customThumb:null};
}

/* render */
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  if(!db.length){g.innerHTML='<div class="empty">유튜브 링크를 붙여넣으면 카드가 생겨요</div>';return;}

  db.forEach((card,idx)=>{
    const el=document.createElement('div');
    el.className='card';el.style.animationDelay=`${idx*.04}s`;
    const src=card.customThumb||card.thumb;

    el.innerHTML=`
      <div class="art">
        <img src="${src}" data-fb="${card.thumbFb}" crossorigin="anonymous"/>
        <div class="art-overlay">
          <div class="play-ring">
            <svg viewBox="0 0 24 24" fill="#1c1c1e"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <div class="info">
        <div class="title" contenteditable="true" spellcheck="false">${esc(card.title)}</div>
        <div class="artist">${esc(card.channel)}</div>
        <div class="acts">
          <button class="abtn save-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            저장
          </button>
          <button class="abtn cover-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            커버
          </button>
          <button class="abtn red del-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>
      <input type="file" class="cfi" accept="image/*"/>
    `;

    /* img load + color */
    const img=el.querySelector('img');
    img.onload=()=>{
      img.classList.add('ok');
      if(!card.colors&&!card.customThumb){
        try{card.colors=extractColors(img);save();}catch(e){}
      }
    };
    img.onerror=()=>{if(img.src!==card.thumbFb)img.src=card.thumbFb;else img.classList.add('ok');};

    /* open yt */
    el.querySelector('.art-overlay').addEventListener('click',()=>{
      window.open(`https://www.youtube.com/watch?v=${card.videoId}`,'_blank');
    });

    /* title edit */
    const te=el.querySelector('.title');
    te.addEventListener('blur',()=>{card.title=te.textContent.trim()||card.title;save();});
    te.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();te.blur();}});
    te.addEventListener('click',e=>e.stopPropagation());

    /* save image */
    el.querySelector('.save-btn').addEventListener('click',e=>{e.stopPropagation();saveCard(card);});

    /* cover */
    const cfi=el.querySelector('.cfi');
    el.querySelector('.cover-btn').addEventListener('click',e=>{e.stopPropagation();cfi.click();});
    cfi.addEventListener('change',()=>{
      const f=cfi.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        card.customThumb=ev.target.result;card.colors=null;save();render();
      };
      r.readAsDataURL(f);
    });

    /* delete */
    el.querySelector('.del-btn').addEventListener('click',e=>{
      e.stopPropagation();db=db.filter(c=>c.id!==card.id);save();render();
    });

    g.appendChild(el);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* add */
async function addCard(){
  const inp=document.getElementById('u'),err=document.getElementById('err'),prog=document.getElementById('prog');
  err.textContent='';
  const url=inp.value.trim(),vid=ytId(url);
  if(!vid){err.textContent='유효한 YouTube URL을 입력해주세요';return;}
  if(db.find(c=>c.videoId===vid)){err.textContent='이미 추가된 영상이에요';return;}
  prog.classList.add('on');document.getElementById('add').disabled=true;
  try{
    const meta=await fetchMeta(vid);
    db.unshift({id:Date.now().toString(),videoId:vid,...meta,colors:null});
    save();inp.value='';render();
  }catch(e){err.textContent=e.message||'불러오기 실패';}
  finally{prog.classList.remove('on');document.getElementById('add').disabled=false;}
}

document.getElementById('add').addEventListener('click',addCard);
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')addCard();});
document.addEventListener('paste',e=>{
  if(document.activeElement===document.getElementById('u'))return;
  const t=e.clipboardData.getData('text');
  if(ytId(t)){document.getElementById('u').value=t;addCard();}
});

render();
</script>
</body>
</html>
