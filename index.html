<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ytcard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

.input-row{display:flex;gap:0;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fff;width:100%;max-width:500px;margin-bottom:8px}
.input-row input{flex:1;border:none;outline:none;padding:13px 16px;font-size:0.9rem;background:transparent;color:#111}
.input-row input::placeholder{color:#aaa}
.input-row button{border:none;background:none;border-left:1px solid #ddd;padding:13px 20px;font-size:0.85rem;font-weight:500;color:#555;cursor:pointer}
.input-row button:hover{background:#f7f7f7}
.err{font-size:0.75rem;color:#d44;width:100%;max-width:500px;margin-bottom:8px;min-height:18px}
.loading{width:100%;max-width:500px;height:2px;background:#eee;border-radius:2px;margin-bottom:16px;overflow:hidden}
.loading.on::after{content:'';display:block;height:100%;width:40%;background:#999;border-radius:2px;animation:sh .8s linear infinite}
@keyframes sh{from{transform:translateX(-150%)}to{transform:translateX(350%)}

/* cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;width:100%;max-width:900px}
.empty{color:#bbb;font-size:0.85rem;text-align:center;padding:40px 0;width:100%;grid-column:1/-1}

/* card */
.card{border-radius:14px;overflow:hidden;background:#fff;border:1px solid #e8e8e8;animation:up .3s ease both;cursor:default;position:relative}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* thumb */
.thumb{position:relative;aspect-ratio:1/1;background:#222;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .4s}
.thumb img.loaded{opacity:1}

/* color strip */
.strip{position:absolute;bottom:0;left:0;right:0;height:4px;display:flex}
.strip span{flex:1}

/* card body — mimics Apple Music / YT Music style */
.body{padding:14px 14px 16px}
.song-title{font-size:0.97rem;font-weight:600;color:#111;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px}
.song-title:hover{background:#f0f0f0}
.song-title:focus{outline:none;background:#f0f0f0}
.channel{font-size:0.78rem;color:#888;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette{display:flex;gap:4px;margin-bottom:12px}
.pdot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}

/* action row */
.actions{display:flex;gap:8px}
.btn{flex:1;border:1px solid #e0e0e0;background:#fff;border-radius:8px;padding:8px 6px;font-size:0.73rem;font-weight:500;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .15s,border-color .15s}
.btn:hover{background:#f5f5f5;border-color:#ccc}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn.danger:hover{background:#fff0f0;border-color:#f5bbbb;color:#c44}

/* cover-change hidden input */
input[type=file]{display:none}
</style>
</head>
<body>

<div class="input-row">
  <input id="u" type="text" placeholder="YouTube URL 붙여넣기" autocomplete="off" spellcheck="false"/>
  <button id="add">추가</button>
</div>
<div class="loading" id="loading"></div>
<div class="err" id="err"></div>
<div class="grid" id="grid"></div>
<canvas id="cv" style="display:none"></canvas>

<script>
const SKEY='ytcard-v4';
let db=JSON.parse(localStorage.getItem(SKEY)||'[]');
const save=()=>localStorage.setItem(SKEY,JSON.stringify(db));

/* ── color extraction ── */
function extractColors(img,n=6){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=cv.height=80;
  ctx.drawImage(img,0,0,80,80);
  const px=ctx.getImageData(0,0,80,80).data,bk={};
  for(let i=0;i<px.length;i+=4){
    if(px[i+3]<128)continue;
    const r=Math.round(px[i]/28)*28,g=Math.round(px[i+1]/28)*28,b=Math.round(px[i+2]/28)*28;
    const lum=.299*r+.587*g+.114*b;
    if(lum<15||lum>240)continue;
    const k=`${r},${g},${b}`;bk[k]=(bk[k]||0)+1;
  }
  const sorted=Object.entries(bk).sort((a,b)=>b[1]-a[1]);
  const picked=[];
  for(const[k]of sorted){
    const[r,g,b]=k.split(',').map(Number);
    if(!picked.some(([pr,pg,pb])=>Math.abs(r-pr)+Math.abs(g-pg)+Math.abs(b-pb)<50))
      picked.push([r,g,b]);
    if(picked.length>=n)break;
  }
  return picked.map(([r,g,b])=>({r,g,b,hex:'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}));
}

function darken(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

/* ── save as image ── mimics the Apple Music / YT Music card UI ── */
function saveCard(card){
  const S=1080;
  const off=document.createElement('canvas');
  off.width=S;off.height=S;
  const ctx=off.getContext('2d');
  const colors=card.colors||[];

  /* 1. background gradient from palette */
  const c0=colors[0]?.hex||'#1a1a1a',c1=colors[1]?.hex||'#2a2a2a';
  const grd=ctx.createLinearGradient(0,0,S,S);
  grd.addColorStop(0,darken(c0,.18));
  grd.addColorStop(1,darken(c1,.26));
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,S,S);

  /* 2. ambient blob */
  const blob=ctx.createRadialGradient(S/2,S*.28,0,S/2,S*.28,S*.55);
  blob.addColorStop(0,c0+'55');
  blob.addColorStop(1,'transparent');
  ctx.fillStyle=blob;
  ctx.fillRect(0,0,S,S);

  /* 3. load and draw album art */
  const doRender=(imgEl)=>{
    /* card rect */
    const PAD=80,CW=S-PAD*2,CH=CW; /* square card */
    const CY=80;
    /* shadow */
    ctx.shadowColor='rgba(0,0,0,0.55)';
    ctx.shadowBlur=60;
    ctx.shadowOffsetY=20;

    /* rounded rect clip */
    const R=36;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(PAD+R,CY);ctx.lineTo(PAD+CW-R,CY);
    ctx.quadraticCurveTo(PAD+CW,CY,PAD+CW,CY+R);
    ctx.lineTo(PAD+CW,CY+CH-R);
    ctx.quadraticCurveTo(PAD+CW,CY+CH,PAD+CW-R,CY+CH);
    ctx.lineTo(PAD+R,CY+CH);
    ctx.quadraticCurveTo(PAD,CY+CH,PAD,CY+CH-R);
    ctx.lineTo(PAD,CY+R);
    ctx.quadraticCurveTo(PAD,CY,PAD+R,CY);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(imgEl,PAD,CY,CW,CH);

    /* color strip at bottom of cover */
    if(colors.length){
      const sw=CW/colors.length;
      colors.forEach((c,i)=>{ctx.fillStyle=c.hex;ctx.fillRect(PAD+i*sw,CY+CH-6,sw,6);});
    }
    ctx.restore();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

    /* title */
    const TY=CY+CH+52;
    ctx.fillStyle='rgba(245,240,232,.95)';
    ctx.font=`bold 44px -apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial`;
    ctx.fillText(clip(card.title,32),PAD,TY,CW);

    /* channel */
    ctx.fillStyle='rgba(245,240,232,.48)';
    ctx.font=`400 28px -apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial`;
    ctx.fillText(card.channel,PAD,TY+46);

    /* palette dots */
    colors.slice(0,6).forEach((c,i)=>{
      ctx.beginPath();
      ctx.arc(PAD+i*22+10,TY+90,8,0,Math.PI*2);
      ctx.fillStyle=c.hex;
      ctx.fill();
    });

    /* download */
    const a=document.createElement('a');
    a.download=(card.title.slice(0,36).replace(/[^\w\s-]/g,'')||'card')+'.png';
    a.href=off.toDataURL('image/png');
    a.click();
  };

  const imgEl=new Image();
  imgEl.crossOrigin='anonymous';
  imgEl.onload=()=>doRender(imgEl);
  imgEl.onerror=()=>{
    /* try fallback thumb */
    if(imgEl.src!==card.thumbFb){imgEl.src=card.thumbFb;}
    else{
      /* draw without image */
      doRender(document.createElement('canvas'));
    }
  };
  imgEl.src=card.customThumb||card.thumb;
}

function clip(t,n){return t.length>n?t.slice(0,n)+'…':t;}

/* ── youtube ── */
function ytId(url){
  const ps=[/youtu\.be\/([^?&]+)/,/[?&]v=([^&]+)/,/embed\/([^?&]+)/,/shorts\/([^?&]+)/];
  for(const p of ps){const m=url.match(p);if(m)return m[1];}return null;
}
async function fetchMeta(vid){
  const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
  if(!r.ok)throw new Error('영상을 찾을 수 없어요');
  const d=await r.json();
  return{title:d.title,channel:d.author_name,
    thumb:`https://img.youtube.com/vi/${vid}/maxresdefault.jpg`,
    thumbFb:`https://img.youtube.com/vi/${vid}/hqdefault.jpg`,
    customThumb:null};
}

/* ── render ── */
function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  if(!db.length){g.innerHTML='<div class="empty">유튜브 링크를 붙여넣으면 카드가 생겨요</div>';return;}

  db.forEach((card,idx)=>{
    const el=document.createElement('div');
    el.className='card';
    el.style.animationDelay=`${idx*.04}s`;
    const swatches=(card.colors||[]).map(c=>`<span style="background:${c.hex}"></span>`).join('');
    const dots=(card.colors||[]).map(c=>`<div class="pdot" style="background:${c.hex}"></div>`).join('');
    const src=card.customThumb||card.thumb;

    el.innerHTML=`
      <div class="thumb">
        <img src="${src}" data-fb="${card.thumbFb}" crossorigin="anonymous"/>
        <div class="strip">${swatches}</div>
      </div>
      <div class="body">
        <div class="song-title" contenteditable="true" spellcheck="false">${escHtml(card.title)}</div>
        <div class="channel">${escHtml(card.channel)}</div>
        <div class="palette">${dots}</div>
        <div class="actions">
          <button class="btn save-btn" title="이미지로 저장">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            이미지 저장
          </button>
          <button class="btn cover-btn" title="커버 변경">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            커버
          </button>
          <button class="btn danger del-btn" title="삭제">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </div>
      <input type="file" class="cover-file" accept="image/*"/>
    `;

    /* thumb load + color extract */
    const img=el.querySelector('img');
    img.onload=()=>{
      img.classList.add('loaded');
      if(!card.colors&&!card.customThumb){
        try{
          const cols=extractColors(img);
          card.colors=cols;save();
          el.querySelector('.strip').innerHTML=cols.map(c=>`<span style="background:${c.hex}"></span>`).join('');
          el.querySelector('.palette').innerHTML=cols.map(c=>`<div class="pdot" style="background:${c.hex}"></div>`).join('');
        }catch(e){}
      }
    };
    img.onerror=()=>{if(img.src!==card.thumbFb)img.src=card.thumbFb;else img.classList.add('loaded');};

    /* title edit */
    const titleEl=el.querySelector('.song-title');
    titleEl.addEventListener('blur',()=>{card.title=titleEl.textContent.trim()||card.title;save();});
    titleEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();titleEl.blur();}});

    /* save image */
    el.querySelector('.save-btn').addEventListener('click',()=>saveCard(card));

    /* cover change */
    const fi=el.querySelector('.cover-file');
    el.querySelector('.cover-btn').addEventListener('click',()=>fi.click());
    fi.addEventListener('change',()=>{
      const f=fi.files[0];if(!f)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        card.customThumb=ev.target.result;
        card.colors=null;
        save();render();
      };
      reader.readAsDataURL(f);
    });

    /* delete */
    el.querySelector('.del-btn').addEventListener('click',()=>{
      db=db.filter(c=>c.id!==card.id);save();render();
    });

    g.appendChild(el);
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── add ── */
async function addCard(){
  const input=document.getElementById('u');
  const err=document.getElementById('err');
  const loading=document.getElementById('loading');
  err.textContent='';
  const url=input.value.trim();
  const vid=ytId(url);
  if(!vid){err.textContent='유효한 YouTube URL을 입력해주세요';return;}
  if(db.find(c=>c.videoId===vid)){err.textContent='이미 추가된 영상이에요';return;}
  loading.classList.add('on');
  document.getElementById('add').disabled=true;
  try{
    const meta=await fetchMeta(vid);
    db.unshift({id:Date.now().toString(),videoId:vid,...meta,colors:null});
    save();input.value='';render();
  }catch(e){err.textContent=e.message||'불러오기 실패';}
  finally{loading.classList.remove('on');document.getElementById('add').disabled=false;}
}

document.getElementById('add').addEventListener('click',addCard);
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')addCard();});
document.addEventListener('paste',e=>{
  if(document.activeElement===document.getElementById('u'))return;
  const t=e.clipboardData.getData('text');
  if(ytId(t)){document.getElementById('u').value=t;addCard();}
});

render();
</script>
</body>
</html>
