<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ytcard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #111;
      --muted: #999;
      --border: #e8e8e8;
      --accent: #555;
      --card-radius: 14px;
      --trans-bg: 1.4s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 80px;
      transition: background var(--trans-bg), color 0.6s;
    }

    body.has-cards {
      --bg: #0e0e0e;
      --fg: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --border: rgba(255,255,255,0.1);
    }

    /* ambient blob – only visible with cards */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 65% 55% at 50% 25%, var(--blob, transparent) 0%, transparent 70%);
      transition: background var(--trans-bg);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Input zone ── */
    .input-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 2;
      margin-bottom: 52px;
    }

    .input-row {
      display: flex;
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
      background: var(--bg);
    }

    body.has-cards .input-row {
      background: rgba(255,255,255,0.06);
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(120,120,120,0.1);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 13px 16px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: var(--fg);
      outline: none;
    }

    .input-row input::placeholder { color: var(--muted); }

    .input-row button {
      background: none;
      border: none;
      border-left: 1.5px solid var(--border);
      padding: 13px 18px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover { background: rgba(120,120,120,0.08); }

    .error-msg {
      font-size: 0.76rem;
      color: #e05050;
      margin-top: 8px;
      align-self: flex-start;
    }

    .loading-pill {
      height: 2px;
      width: 100%;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .loading-pill.active { opacity: 1; }

    .loading-pill::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 2px;
      animation: shimmer 0.9s linear infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-150%); }
      to   { transform: translateX(350%); }
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 940px;
      position: relative;
      z-index: 1;
    }

    .card {
      border: 1.5px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      animation: rise 0.38s ease both;
      background: rgba(255,255,255,0.04);
      position: relative;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:none; }
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    .card.active {
      border-color: rgba(255,255,255,0.3);
    }

    /* ── Thumb ── */
    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1a1a1a;
    }

    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .color-strip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      display: flex;
    }

    .color-strip span { flex:1; }

    /* play overlay */
    .play-layer {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.28);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover .play-layer { opacity: 1; }

    .play-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
    }

    .play-circle svg { width:18px; height:18px; margin-left:2px; }

    /* ── Card actions toolbar ── */
    .card-actions {
      position: absolute;
      top: 8px; right: 8px;
      display: flex; gap: 5px;
      opacity: 0;
      transition: opacity 0.18s;
    }

    .card:hover .card-actions { opacity: 1; }

    .act-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .act-btn:hover { background: rgba(0,0,0,0.8); }
    .act-btn.del:hover { background: rgba(180,30,30,0.8); }

    /* hidden file input for cover change */
    .cover-input { display: none; }

    /* ── Card info ── */
    .card-info {
      padding: 13px 14px 15px;
    }

    /* Editable title */
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.97rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--fg);
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      resize: none;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      cursor: text;
      display: block;
      padding: 2px 4px;
      margin: -2px -4px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .card-title:hover { background: rgba(255,255,255,0.06); }
    .card-title:focus { background: rgba(255,255,255,0.1); }

    .card-channel {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-palette {
      display: flex; gap: 4px;
      margin-top: 10px;
    }

    .pal-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Save overlay (visible on hover of thumb) ── */
    .save-btn-wrap {
      position: absolute;
      bottom: 28px; left: 0; right: 0;
      display: flex; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card:hover .save-btn-wrap {
      opacity: 1;
      pointer-events: all;
    }

    .save-thumb-btn {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.72rem;
      font-family: 'Inter', sans-serif;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-thumb-btn:hover { background: rgba(0,0,0,0.9); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 20px 20px 0;
      color: #bbb;
    }

    .empty p {
      font-size: 0.82rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="input-zone">
    <div class="input-row">
      <input id="url-input" type="text" placeholder="YouTube URL" autocomplete="off" spellcheck="false" />
      <button id="add-btn">추가</button>
    </div>
    <div class="loading-pill" id="loading"></div>
    <div class="error-msg" id="err"></div>
  </div>

  <div class="cards" id="cards"></div>
  <canvas id="cv" style="display:none"></canvas>

<script>
const SKEY = 'ytcard-v3';
let data = JSON.parse(localStorage.getItem(SKEY) || '[]');
let activeId = data[0]?.id ?? null;

/* ── Color utils ─────────────────────────────── */
function extractColors(img, n=5) {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width = cv.height = 80;
  ctx.drawImage(img, 0, 0, 80, 80);
  const px = ctx.getImageData(0,0,80,80).data;
  const buckets = {};
  for (let i=0;i<px.length;i+=4) {
    if (px[i+3]<128) continue;
    const r=Math.round(px[i]/32)*32,
          g=Math.round(px[i+1]/32)*32,
          b=Math.round(px[i+2]/32)*32;
    const lum=0.299*r+0.587*g+0.114*b;
    if (lum<18||lum>238) continue;
    const k=`${r},${g},${b}`;
    buckets[k]=(buckets[k]||0)+1;
  }
  const sorted=Object.entries(buckets).sort((a,b)=>b[1]-a[1]);
  const picked=[];
  for(const[k] of sorted){
    const[r,g,b]=k.split(',').map(Number);
    if(!picked.some(([pr,pg,pb])=>Math.abs(r-pr)+Math.abs(g-pg)+Math.abs(b-pb)<55))
      picked.push([r,g,b]);
    if(picked.length>=n) break;
  }
  return picked.map(([r,g,b])=>({r,g,b,hex:'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}));
}

function darken(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

function applyBg(colors){
  if(!colors||!colors.length) return;
  document.body.style.setProperty('--blob', colors[0].hex+'44');
  document.documentElement.style.setProperty('--dynamic-bg1', darken(colors[0].hex,0.15));
  document.documentElement.style.setProperty('--dynamic-bg2', darken((colors[1]||colors[0]).hex,0.22));
  // override body bg via style
  document.body.style.background=`linear-gradient(145deg,${darken(colors[0].hex,0.15)} 0%,${darken((colors[1]||colors[0]).hex,0.22)} 100%)`;
}

/* ── YouTube ─────────────────────────────────── */
function ytId(url){
  const pats=[/youtu\.be\/([^?&]+)/,/[?&]v=([^&]+)/,/embed\/([^?&]+)/,/shorts\/([^?&]+)/];
  for(const p of pats){const m=url.match(p);if(m)return m[1];}
  return null;
}

async function fetchMeta(vid){
  const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
  if(!r.ok) throw new Error('영상을 찾을 수 없어요');
  const d=await r.json();
  return {
    title: d.title,
    channel: d.author_name,
    thumb: `https://img.youtube.com/vi/${vid}/maxresdefault.jpg`,
    thumbFb: `https://img.youtube.com/vi/${vid}/hqdefault.jpg`,
    customThumb: null,
  };
}

/* ── Save image ──────────────────────────────── */
function saveCardImage(card) {
  // Draw thumb + title onto canvas and download
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const W=1080, H=1080;
    const cv2 = document.createElement('canvas');
    cv2.width=W; cv2.height=H;
    const ctx=cv2.getContext('2d');

    // Bg from colors
    const colors=card.colors;
    if(colors&&colors.length>=2){
      const grd=ctx.createLinearGradient(0,0,W,H);
      grd.addColorStop(0,darken(colors[0].hex,0.18));
      grd.addColorStop(1,darken(colors[1].hex,0.28));
      ctx.fillStyle=grd;
    } else {
      ctx.fillStyle='#111';
    }
    ctx.fillRect(0,0,W,H);

    // Thumb centered with rounded rect clip
    const pad=80, tw=W-pad*2, th=Math.round(tw*9/16);
    const ty=(H-th)/2-60;
    const r=28;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pad+r,ty);
    ctx.lineTo(pad+tw-r,ty);
    ctx.quadraticCurveTo(pad+tw,ty,pad+tw,ty+r);
    ctx.lineTo(pad+tw,ty+th-r);
    ctx.quadraticCurveTo(pad+tw,ty+th,pad+tw-r,ty+th);
    ctx.lineTo(pad+r,ty+th);
    ctx.quadraticCurveTo(pad,ty+th,pad,ty+th-r);
    ctx.lineTo(pad,ty+r);
    ctx.quadraticCurveTo(pad,ty,pad+r,ty);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(img,pad,ty,tw,th);
    ctx.restore();

    // Color strip
    if(colors&&colors.length){
      const sw=tw/colors.length;
      colors.forEach((c,i)=>{
        ctx.fillStyle=c.hex;
        ctx.fillRect(pad+i*sw,ty+th-5,sw,5);
      });
    }

    // Title
    ctx.fillStyle='rgba(240,235,225,0.92)';
    ctx.font='bold 36px Georgia, serif';
    ctx.fillText(card.title, pad, ty+th+56, tw);

    // Channel
    ctx.fillStyle='rgba(240,235,225,0.45)';
    ctx.font='24px Inter, sans-serif';
    ctx.fillText(card.channel, pad, ty+th+98);

    const a=document.createElement('a');
    a.download=`${card.title.slice(0,40).replace(/[^\w\s-]/g,'')}.png`;
    a.href=cv2.toDataURL('image/png');
    a.click();
  };
  img.onerror=()=>{ alert('이미지 저장 실패 (CORS 제한)'); };
  img.src=card.customThumb||card.thumb;
}

/* ── Render ──────────────────────────────────── */
function save(){ localStorage.setItem(SKEY,JSON.stringify(data)); }

function render(){
  const wrap=document.getElementById('cards');
  wrap.innerHTML='';

  if(!data.length){
    document.body.classList.remove('has-cards');
    document.body.style.background='';
    wrap.innerHTML=`<div class="empty"><p>유튜브 링크를 붙여넣으면<br>카드가 생성돼요</p></div>`;
    return;
  }

  document.body.classList.add('has-cards');

  data.forEach((card,idx)=>{
    const isActive=card.id===activeId;
    const el=document.createElement('div');
    el.className='card'+(isActive?' active':'');
    el.style.animationDelay=`${idx*0.04}s`;

    const swatches=(card.colors||[]).map(c=>`<span style="background:${c.hex}"></span>`).join('');
    const dots=(card.colors||[]).map(c=>`<div class="pal-dot" style="background:${c.hex}"></div>`).join('');
    const src=card.customThumb||card.thumb;

    el.innerHTML=`
      <div class="thumb-wrap">
        <img src="${src}" data-fb="${card.thumbFb}" crossorigin="anonymous" style="opacity:0;transition:opacity .4s" />
        <div class="color-strip">${swatches}</div>
        <div class="play-layer">
          <div class="play-circle">
            <svg viewBox="0 0 24 24" fill="#111"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="save-btn-wrap">
          <button class="save-thumb-btn" data-id="${card.id}">이미지 저장</button>
        </div>
        <div class="card-actions">
          <button class="act-btn cover-change-btn" data-id="${card.id}" title="커버 변경">🖼</button>
          <button class="act-btn del" data-id="${card.id}" title="삭제">✕</button>
        </div>
        <input type="file" class="cover-input" accept="image/*" data-id="${card.id}" />
      </div>
      <div class="card-info">
        <textarea class="card-title" rows="2" data-id="${card.id}">${card.title}</textarea>
        <div class="card-channel">${card.channel}</div>
        <div class="card-palette">${dots}</div>
      </div>
    `;

    // Thumb load
    const img=el.querySelector('img');
    img.onload=()=>{
      img.style.opacity='1';
      if(!card.colors&&!card.customThumb){
        try{
          const colors=extractColors(img);
          card.colors=colors;
          save();
          el.querySelector('.color-strip').innerHTML=colors.map(c=>`<span style="background:${c.hex}"></span>`).join('');
          el.querySelector('.card-palette').innerHTML=colors.map(c=>`<div class="pal-dot" style="background:${c.hex}"></div>`).join('');
          if(isActive) applyBg(colors);
        }catch(e){}
      } else if(isActive&&card.colors){
        applyBg(card.colors);
      }
    };
    img.onerror=()=>{ if(img.src!==card.thumbFb) img.src=card.thumbFb; else img.style.opacity='1'; };

    // Open YT
    el.querySelector('.play-layer').addEventListener('click',()=>{
      activeId=card.id;
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
      el.classList.add('active');
      if(card.colors) applyBg(card.colors);
      window.open(`https://www.youtube.com/watch?v=${card.videoId}`,'_blank');
    });

    // Title edit
    const titleEl=el.querySelector('.card-title');
    autoResizeTextarea(titleEl);
    titleEl.addEventListener('input',()=>{
      card.title=titleEl.value;
      save();
      autoResizeTextarea(titleEl);
    });
    titleEl.addEventListener('click',e=>e.stopPropagation());
    titleEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); titleEl.blur(); } });

    // Save image
    el.querySelector('.save-thumb-btn').addEventListener('click',e=>{
      e.stopPropagation();
      saveCardImage(card);
    });

    // Cover change
    const coverInput=el.querySelector('.cover-input');
    el.querySelector('.cover-change-btn').addEventListener('click',e=>{
      e.stopPropagation();
      coverInput.click();
    });
    coverInput.addEventListener('change',()=>{
      const file=coverInput.files[0];
      if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        card.customThumb=ev.target.result;
        // re-extract colors from custom image
        const tmpImg=new Image();
        tmpImg.onload=()=>{
          try{
            const colors=extractColors(tmpImg);
            card.colors=colors;
          }catch(e){}
          save();
          render();
          if(activeId===card.id&&card.colors) applyBg(card.colors);
        };
        tmpImg.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Delete
    el.querySelector('.del').addEventListener('click',e=>{
      e.stopPropagation();
      data=data.filter(c=>c.id!==card.id);
      save();
      if(activeId===card.id){
        activeId=data[0]?.id??null;
      }
      render();
    });

    wrap.appendChild(el);
  });

  const active=data.find(c=>c.id===activeId);
  if(active?.colors) applyBg(active.colors);
}

function autoResizeTextarea(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

/* ── Add ─────────────────────────────────────── */
async function addCard(){
  const input=document.getElementById('url-input');
  const err=document.getElementById('err');
  const loading=document.getElementById('loading');
  err.textContent='';
  const url=input.value.trim();
  const vid=ytId(url);
  if(!vid){ err.textContent='유효한 YouTube URL을 입력해주세요'; return; }
  if(data.find(c=>c.videoId===vid)){ err.textContent='이미 추가된 영상이에요'; return; }
  loading.classList.add('active');
  document.getElementById('add-btn').disabled=true;
  try{
    const meta=await fetchMeta(vid);
    data.unshift({id:Date.now().toString(),videoId:vid,...meta,colors:null});
    activeId=data[0].id;
    save();
    input.value='';
    render();
  }catch(e){
    err.textContent=e.message||'불러오기 실패';
  }finally{
    loading.classList.remove('active');
    document.getElementById('add-btn').disabled=false;
  }
}

document.getElementById('add-btn').addEventListener('click',addCard);
document.getElementById('url-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addCard(); });

document.addEventListener('paste',e=>{
  if(document.activeElement===document.getElementById('url-input')) return;
  const t=e.clipboardData.getData('text');
  if(ytId(t)){ document.getElementById('url-input').value=t; addCard(); }
});

render();
</script>
</body>
</html>
